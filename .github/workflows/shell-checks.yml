name: Shell Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt ripgrep

      - name: Run shell checks
        run: ./scripts/lint-shell.sh
